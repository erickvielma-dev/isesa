# ============================================================
# iSESA — Deploy to Firebase Hosting
# Se ejecuta únicamente en push a la rama master.
#
# Secretos requeridos en GitHub → Settings → Secrets and variables → Actions:
#   FIREBASE_SERVICE_ACCOUNT   → JSON de la cuenta de servicio de Firebase
#                                 (obtenido desde Firebase Console → Project Settings
#                                  → Service accounts → Generate new private key)
# ============================================================
name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

# ── Permisos mínimos ────────────────────────────────────────
permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Build de producción — genera archivos estáticos en dist/
      - name: Build
        run: npm run build

      # 5. Subir artefacto con el sitio estático (útil para auditoría)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
          retention-days: 14

      # 6. Desplegar en Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: isesa-mx
